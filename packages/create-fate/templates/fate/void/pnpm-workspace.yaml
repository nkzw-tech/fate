packages:
  - .

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.23
  vite-plus: ^0.1.23
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.23

minimumReleaseAgeExclude:
  - '@voidzero-dev/vite-plus-core'
  - '@voidzero-dev/vite-plus-test'
  - vite-plus

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - better-sqlite3
  - esbuild
  - msgpackr-extract
  - sharp
  - workerd

overrides:
  kysely: 0.28.17
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
