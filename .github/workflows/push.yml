name: push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Run setup
        run: vp install && vp run dev:setup && vp run build:all && vpx typedoc

      - name: Run check
        run: vp check

      - name: Run tests
        run: vp test

      - name: Publish
        run: vpx pkg-pr-new publish './packages/*' --compact
